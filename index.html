<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CanDen Immigration Services — Coming Soon</title>
  <meta name="description" content="CanDen Immigration Services — expert advice for your move to Canada. Our new website is coming soon." />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:title" content="CanDen Immigration Services — Coming Soon" />
  <meta property="og:description" content="Our new website is on its way. We'll be live soon." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/img/logo/Main_logo.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/img/logo/Main_logo.png" />
  <link rel="apple-touch-icon" href="assets/img/logo/Main_logo.png" />

  <!-- Brand font: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --navy: #0F172A;
      --gray-text: #787B84;
      --light-bg: #EDF3F5;
      --grad-from: #D91334;
      --grad-to: #FB4927;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--light-bg);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Soft on-brand gradient glows in the background */
    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.28;
      z-index: 0;
      pointer-events: none;
    }
    body::before {
      width: 460px; height: 460px;
      background: radial-gradient(circle, var(--grad-from), transparent 70%);
      top: -140px; left: -120px;
    }
    body::after {
      width: 520px; height: 520px;
      background: radial-gradient(circle, var(--grad-to), transparent 70%);
      bottom: -180px; right: -140px;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 640px;
      width: 100%;
      animation: fadeUp 0.9s ease both;
    }

    .logo {
      width: clamp(92px, 18vw, 118px);
      height: auto;
      margin-bottom: 28px;
      filter: drop-shadow(0 12px 28px rgba(15, 23, 42, 0.12));
    }

    .brand {
      font-size: clamp(1.15rem, 3.2vw, 1.6rem);
      font-weight: 700;
      letter-spacing: 0.2px;
      color: var(--navy);
      margin-bottom: 22px;
    }

    .headline {
      font-size: clamp(2.6rem, 9vw, 5rem);
      font-weight: 800;
      line-height: 1.15;
      padding-bottom: 0.08em;
      letter-spacing: -1px;
      background: linear-gradient(90deg, var(--grad-from) 0%, var(--grad-to) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      margin-bottom: 20px;
    }

    .subline {
      font-size: clamp(0.98rem, 2.6vw, 1.18rem);
      font-weight: 400;
      color: var(--gray-text);
      max-width: 460px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .divider {
      width: 64px;
      height: 4px;
      border-radius: 4px;
      margin: 30px auto 0;
      background: linear-gradient(90deg, var(--grad-from) 0%, var(--grad-to) 100%);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .wrap { animation: none; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="logo" src="assets/img/logo/Main_logo.png" alt="CanDen Immigration Services logo" />
    <p class="brand">CanDen Immigration Services</p>
    <h1 class="headline">Coming Soon</h1>
    <p class="subline">Our new website is on its way. We're putting the finishing touches in place and will be live very soon.</p>
    <div class="divider"></div>
  </main>
</body>
</html>
